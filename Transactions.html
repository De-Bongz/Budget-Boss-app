<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Budget Boss - Transactions</title>
  <link rel="stylesheet" href="design.css">
</head>
<body>
  <!-- Navigation -->
  <header>
  <span class="menu-toggle" onclick="toggleMenu()">☰</span> <!-- Hamburger -->
  <h1>💼 Budget Boss</h1>
  <nav>
    <ul id="nav-menu">
      <li><a href="Home.html">Home</a></li>
      <li><a href="Dashboard.html">Dashboard</a></li>
      <li><a href="Transactions.html" class="active">Transactions</a></li>
      <li><a href="Reports.html">Reports</a></li>
      <li><a href="Settings.html">Settings</a></li>
    </ul>
  </nav>
</header>

  <main>
        <section class="card">
        <h2>All Transactions</h2>
        <table>
            <thead>
            <tr>
              <td data-label="Date">3/16/2026</td>
              <td data-label="Description">fhf</td>
              <td data-label="Category">-</td>
              <td data-label="Type">income</td>
              <td data-label="Amount">+R2664.00</td>
            </tr>
            </thead>
            <tbody id="transactionList"></tbody>
        </table>
        </section>


        <div class="filters">
          <button onclick="filterTransactions('income')">Show Income</button>
          <button onclick="filterTransactions('expense')">Show Expenses</button>
          <button onclick="initTransactions()">Show All</button>
        </div>

    </main>

   <script src="Script.js"></script>

    <script>
                // Apply saved theme on page load
            document.addEventListener("DOMContentLoaded", () => {
                const savedTheme = localStorage.getItem("theme") || "light";
                if (savedTheme === "dark") {
                    document.body.classList.add("dark-mode");
                }
            });
        </script>
</body>
</html>
