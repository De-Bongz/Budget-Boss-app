<!DOCTYPE html>
<html lang="en">

    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Budget Boss Dashboard</title>
        <link rel="stylesheet" href="design.css">
        <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    </head>

    <body>

        <header>
    <span class="menu-toggle" onclick="toggleMenu()">☰</span> <!-- Hamburger for mobile -->
    <h1>💼 Budget Boss</h1>
    <nav>
        <ul id="nav-menu">
            <li><a href="Home.html">Home</a></li>
            <li><a href="Dashboard.html" class="active">Dashboard</a></li>
            <li><a href="Transactions.html">Transactions</a></li>
            <li><a href="Reports.html">Reports</a></li>
            <li><a href="Settings.html">Settings</a></li>
        </ul>
    </nav>
</header>


        <main class="dashboard">

            <!-- Balance Summary -->
            <section class="card balance-card">

                <h2>Current Balance</h2>
                <p><span id="balance">R0.00</span></p>
                <p>Total Income: <span id="totalIncome">R0.00</span></p>
                <p>Total Expenses: <span id="totalExpenses">R0.00</span></p>

            </section>

            <!-- Recent Transactions -->
            <section class="card">

                <h2>Recent Transactions</h2>
                <table>
                    <thead>
                        <tr>
                            <th>Date</th>
                            <th>Description</th>
                            <th>Category</th>
                            <th>Amount</th>
                        </tr>
                    </thead>
                    <tbody id="transactionList"></tbody>
                </table>

                <button onclick="viewAllTransactions()">View All</button>

            </section>



            <!-- Expense Chart -->
            <section class="card">
                <h2>Expense Breakdown</h2>
                <canvas id="expenseChart"></canvas>
            </section>



            <!-- Balance Chart -->
            <section class="card">
                <h2>Balance Trend</h2>
                <canvas id="balanceChart"></canvas>
            </section>


        </main>


         <script src="Script.js"></script>

          <script>
                // Apply saved theme on page load
            document.addEventListener("DOMContentLoaded", () => {
                const savedTheme = localStorage.getItem("theme") || "light";
                if (savedTheme === "dark") {
                    document.body.classList.add("dark-mode");
                }
            });
        </script>

    </body>

</html>
